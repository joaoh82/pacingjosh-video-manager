name: CI

# Fast feedback on every pull request into main: frontend lint + build, and
# Rust compile/clippy/test on the active backend. The full Tauri bundle is
# exercised by the release workflow, not here, so PR CI stays quick.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (static export)
        run: npm run build

  rust:
    name: Rust (clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend-rust
            src-tauri
      # Formatting is advisory: the existing code is not fully rustfmt-clean, so
      # this reports drift without blocking. Flip to a hard gate after a
      # one-off `cargo fmt` across backend-rust/ and src-tauri/.
      - name: Format check (advisory)
        continue-on-error: true
        run: |
          cargo fmt --all --check --manifest-path backend-rust/Cargo.toml
          cargo fmt --all --check --manifest-path src-tauri/Cargo.toml
      # Hard gates: clippy (fails on errors / deny-level lints, not warnings) and
      # the test suite (compiles the crate; runs cleanly with zero tests today).
      - name: Clippy (backend-rust)
        run: cargo clippy --all-targets --manifest-path backend-rust/Cargo.toml
      - name: Test (backend-rust)
        run: cargo test --manifest-path backend-rust/Cargo.toml
