name: Release

# Builds and publishes cross-platform installers for a TAG.
#
# Triggered three ways:
#   - push of a `v*.*.*` tag (e.g. you run `git push origin v1.2.0` by hand)
#   - called by the "Bump & Tag" workflow right after it creates a tag
#     (workflow_call) — this is the normal path
#   - manually from the Actions tab to (re)build an existing tag (workflow_dispatch)
#
# Note: a tag pushed by the default GITHUB_TOKEN does NOT fire the `push: tags`
# trigger (GitHub blocks that to prevent loops), which is exactly why the
# automated path uses workflow_call instead — no PAT required, no double build.

on:
  push:
    tags: ['v*.*.*']
  workflow_call:
    inputs:
      tag:
        description: Tag to build (e.g. v1.2.0)
        required: true
        type: string
      release_body:
        description: Release notes body (falls back to auto-generated notes if empty)
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to (re)build (e.g. v1.2.0)
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Resolve tag
        id: resolve
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: ${{ steps.resolve.outputs.tag }}
          body: ${{ inputs.release_body }}
          generate_release_notes: ${{ !inputs.release_body }}
          draft: true
          prerelease: false

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential file libssl-dev libgtk-3-dev libsoup-3.0-dev wget

      - name: Fetch FFmpeg sidecars
        run: node scripts/fetch-ffmpeg-ci.mjs ${{ matrix.target }}

      - name: Generate app icons
        # images/icon.png is the square (512x512) source; images/Logo.png is the
        # wide wordmark and is rejected by `tauri icon` ("must be square").
        run: npx --yes @tauri-apps/cli@2 icon images/icon.png --output src-tauri/icons

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build & upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Optional code signing (left unset; installers ship UNSIGNED) ---
          # macOS: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #        APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          # Windows: configure a signing command in tauri.conf.json
        with:
          projectPath: src-tauri
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.prepare.outputs.tag }}" \
            --draft=false \
            --repo "${{ github.repository }}"
