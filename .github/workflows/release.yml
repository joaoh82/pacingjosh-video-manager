name: Release

# On merge to main:
#   1. Compute the next version from Conventional Commits since the last tag.
#      (feat -> minor, fix -> patch, feat!/BREAKING CHANGE -> major. If nothing
#       releasable was merged, the whole run is a no-op.)
#   2. Bump the version in every file, commit + tag, and open a draft release.
#   3. Build signed-less installers for Windows, macOS (Apple Silicon) and Linux
#      and attach them to the release.
#   4. Publish (un-draft) the release once all platforms succeed.
#
# The version commit is pushed with the default GITHUB_TOKEN, whose pushes do
# not re-trigger workflows, so there is no release loop ([skip ci] is added too).

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.decide.outputs.release_created }}
      new_version: ${{ steps.tag.outputs.new_version }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version (Conventional Commits)
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          dry_run: true

      - name: Decide whether to release
        id: decide
        run: |
          if [ -z "${{ steps.tag.outputs.release_type }}" ]; then
            echo "No releasable commits since last tag — skipping release."
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing ${{ steps.tag.outputs.new_tag }} (${{ steps.tag.outputs.release_type }})."
            echo "release_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version files
        if: steps.decide.outputs.release_created == 'true'
        run: node scripts/bump-version.mjs "${{ steps.tag.outputs.new_version }}"

      - name: Commit, tag and push
        if: steps.decide.outputs.release_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): ${{ steps.tag.outputs.new_tag }} [skip ci]"
          git tag "${{ steps.tag.outputs.new_tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Create draft release
        id: create_release
        if: steps.decide.outputs.release_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          draft: true
          prerelease: false

  build:
    name: Build (${{ matrix.target }})
    needs: version
    if: needs.version.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential file libssl-dev libgtk-3-dev libsoup-3.0-dev wget

      - name: Fetch FFmpeg sidecars
        run: node scripts/fetch-ffmpeg-ci.mjs ${{ matrix.target }}

      - name: Generate app icons
        # images/icon.png is the square (512x512) source; images/Logo.png is the
        # wide wordmark and is rejected by `tauri icon` ("must be square").
        run: npx --yes @tauri-apps/cli@2 icon images/icon.png --output src-tauri/icons

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build & upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Optional code signing (left unset; installers ship UNSIGNED) ---
          # macOS: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #        APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          # Windows: configure a signing command in tauri.conf.json
        with:
          projectPath: src-tauri
          releaseId: ${{ needs.version.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs: [version, build]
    if: needs.version.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.version.outputs.new_tag }}" \
            --draft=false \
            --repo "${{ github.repository }}"
