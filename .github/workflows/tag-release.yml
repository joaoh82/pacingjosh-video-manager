name: Bump & Tag

# Manual release trigger. Run this from the Actions tab AFTER your PRs are
# merged to main. It:
#   1. derives the next version from Conventional Commits since the last tag
#      (feat -> minor, fix -> patch, feat!/BREAKING CHANGE -> major),
#   2. bumps the version in every manifest + lockfile, commits it to main,
#   3. creates and pushes the `vX.Y.Z` tag, then
#   4. calls the Release workflow to build + publish installers for that tag.
#
# If there are no Conventional Commits since the last tag, nothing happens —
# unless you set the "default_bump" input to force a patch/minor/major bump.

on:
  workflow_dispatch:
    inputs:
      default_bump:
        description: 'Bump to use when there are no Conventional Commits since the last tag'
        type: choice
        options: ['false', 'patch', 'minor', 'major']
        default: 'false'

concurrency:
  group: tag-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    name: Compute version & tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.decide.outputs.release_created }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version (Conventional Commits)
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.default_bump }}
          dry_run: true

      - name: Decide whether to release
        id: decide
        run: |
          if [ -z "${{ steps.tag.outputs.release_type }}" ]; then
            echo "::notice::No releasable commits since the last tag (and no default_bump set) — nothing to tag."
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing ${{ steps.tag.outputs.new_tag }} (${{ steps.tag.outputs.release_type }})."
            echo "release_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version files
        if: steps.decide.outputs.release_created == 'true'
        run: node scripts/bump-version.mjs "${{ steps.tag.outputs.new_version }}"

      - name: Commit, tag and push
        if: steps.decide.outputs.release_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): ${{ steps.tag.outputs.new_tag }} [skip ci]"
          git tag "${{ steps.tag.outputs.new_tag }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

  # Build + publish installers for the tag we just created. The tag was pushed
  # with GITHUB_TOKEN (so it can't trigger release.yml's `push: tags`), so we
  # invoke the Release workflow directly here — no PAT, no double build.
  release:
    name: Release
    needs: tag
    if: needs.tag.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.new_tag }}
      release_body: ${{ needs.tag.outputs.changelog }}
    secrets: inherit
